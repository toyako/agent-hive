name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Run tests
        run: |
          node dist/commands/test-graph.js
          node dist/commands/test-conversation.js
          node dist/commands/test-v2-integration.js
          node dist/commands/test-runtime-intelligence.js
          node dist/commands/test-observability.js
          node dist/commands/test-benchmark.js

      - name: Verify CLI
        run: |
          node dist/commands/cli.js version
          node dist/commands/cli.js detect --dry-run
