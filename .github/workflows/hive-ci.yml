name: Hive Determinism Gate

on:
  pull_request:
  push:

jobs:
  hive-ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install
        run: npm install

      - name: Build Hive
        run: npm run build

      # 1. contract check
      - name: Contract Validation
        run: node dist/cli.js contract validate

      # 2. determinism test
      - name: Determinism Gate
        run: node dist/cli.js validate "ci-test-input"

      # 3. chaos regression
      - name: Chaos Regression
        run: node dist/cli.js chaos "ci-test-input" 500

      # 4. stress validation
      - name: Stress Gate
        run: node dist/cli.js test "ci-test-input" 1000

      # 5. enforce final gate
      - name: Final Gate Check
        run: node dist/cli.js ci gate
